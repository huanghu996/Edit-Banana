<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Banana — Image to DrawIO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --yellow: #f5c542;
      --yellow-dim: #c9a030;
      --text: #e8eaf0;
      --text-muted: #7a7f9a;
      --green: #4caf82;
      --red: #e05c6a;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--yellow); }

    .badge {
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 20px;
    }

    main {
      width: 100%;
      max-width: 860px;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    h1 em { color: var(--yellow); font-style: normal; }

    .subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 8px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 56px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone.drag-over {
      border-color: var(--yellow);
      background: #1f2133;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      width: 56px;
      height: 56px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .drop-text { font-size: 15px; color: var(--text-muted); text-align: center; }
    .drop-text strong { color: var(--text); }
    .drop-formats { font-size: 12px; color: var(--text-muted); }

    /* Preview + actions row */
    .preview-row {
      display: none;
      gap: 24px;
      align-items: flex-start;
    }
    .preview-row.visible { display: flex; }

    .preview-card {
      flex: 0 0 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .preview-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .preview-card .preview-name {
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-top: 1px solid var(--border);
    }

    .action-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .file-info {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .file-info .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .file-info .value { font-size: 14px; font-weight: 500; word-break: break-all; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--yellow); color: #1a1400; }
    .btn-primary:hover:not(:disabled) { background: #f0b800; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px 16px;
    }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-download { background: var(--green); color: #fff; }
    .btn-download:hover { background: #3d9e6e; }
    .btn-drawio { background: #1565c0; color: #fff; }
    .btn-drawio:hover { background: #0d47a1; }

    /* Progress */
    .progress-wrap {
      display: none;
      flex-direction: column;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .progress-wrap.visible { display: flex; }
    .progress-label {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stage-count { color: var(--yellow); font-weight: 700; font-size: 15px; }

    /* Segmented bar */
    .progress-segments {
      display: flex;
      gap: 4px;
    }
    .progress-segment {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--surface2);
      transition: background 0.4s;
    }
    .progress-segment.done   { background: var(--green); }
    .progress-segment.active { background: var(--yellow); animation: seg-pulse 1s ease-in-out infinite; }
    @keyframes seg-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    /* Stage list */
    .stages-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .stage-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .stage-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .stage-icon.done    { background: var(--green);   color: #fff; }
    .stage-icon.active  { background: var(--yellow);  color: #1a1400; animation: seg-pulse 1s infinite; }
    .stage-icon.pending { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .stage-label        { flex: 1; }
    .stage-label.done   { color: var(--text); }
    .stage-label.active { color: var(--yellow); font-weight: 600; }
    .stage-label.pending{ color: var(--text-muted); }
    .stage-time         { font-size: 12px; color: var(--text-muted); min-width: 48px; text-align: right; font-family: 'JetBrains Mono', monospace; }
    .stage-time.done    { color: var(--green); }
    .stage-time.active  { color: var(--yellow); }

    .progress-detail {
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 2px;
    }

    /* Result */
    .result-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .result-card.visible { display: block; }
    .result-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .result-header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .dot.success { background: var(--green); }
    .dot.error   { background: var(--red); }
    .result-body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .xml-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #a8b0d0;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* Error state */
    .error-msg {
      background: #2a1219;
      border: 1px solid #5a2030;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #f48c99;
      white-space: pre-wrap;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .preview-row { flex-direction: column; }
      .preview-card { flex: unset; width: 100%; }
      h1 { font-size: 24px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako_deflate.min.js"></script>
</head>
<body>

<header>
  <div class="logo">Edit<span>Banana</span></div>
  <span class="badge">v1.0</span>
</header>

<main>
  <div>
    <h1>Turn diagrams into <em>editable</em> DrawIO</h1>
    <p class="subtitle">Upload a diagram image — get back fully editable DrawIO XML in seconds.</p>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.bmp,.tiff,.webp" />
    <div class="drop-icon">🍌</div>
    <div class="drop-text"><strong>Drop your image here</strong><br>or click to browse</div>
    <div class="drop-formats">PNG · JPG · BMP · TIFF · WebP</div>
  </div>

  <!-- Preview + actions (shown after file selected) -->
  <div class="preview-row" id="previewRow">
    <div class="preview-card">
      <img id="previewImg" src="" alt="Preview" />
      <div class="preview-name" id="previewName"></div>
    </div>
    <div class="action-panel">
      <div class="file-info">
        <div class="label">File</div>
        <div class="value" id="infoName">—</div>
      </div>
      <div class="file-info">
        <div class="label">Size</div>
        <div class="value" id="infoSize">—</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" id="convertBtn">Convert to DrawIO</button>
        <button class="btn btn-ghost" id="clearBtn">Clear</button>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressLabel">处理中...</span>
      <span id="progressTimer">0s</span>
    </div>
    <div class="progress-segments" id="progressSegments"></div>
    <div class="stages-list"     id="stagesList"></div>
    <div class="progress-detail" id="progressDetail"></div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="status" id="resultStatus">
        <div class="dot success" id="resultDot"></div>
        <span id="resultTitle">Conversion complete</span>
      </div>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>
</main>

<script>
  const dropZone     = document.getElementById('dropZone');
  const fileInput    = document.getElementById('fileInput');
  const previewRow   = document.getElementById('previewRow');
  const previewImg   = document.getElementById('previewImg');
  const previewName  = document.getElementById('previewName');
  const infoName     = document.getElementById('infoName');
  const infoSize     = document.getElementById('infoSize');
  const convertBtn   = document.getElementById('convertBtn');
  const clearBtn     = document.getElementById('clearBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressLabel  = document.getElementById('progressLabel');
  const progressTimer  = document.getElementById('progressTimer');
  const progressDetail = document.getElementById('progressDetail');
  const resultCard   = document.getElementById('resultCard');
  const resultDot    = document.getElementById('resultDot');
  const resultTitle  = document.getElementById('resultTitle');
  const resultBody   = document.getElementById('resultBody');

  let selectedFile = null;
  let resultBlob = null;
  let resultFilename = 'output.xml';
  let _statusPoller = null;
  let _timerInterval = null;
  let _startTime = null;

  // ── Stage tracking ──────────────────────────────────────────────────────────
  const STAGES = [
    { key: '预处理 Preprocess', label: '预处理 Preprocess' },
    { key: '文字识别 OCR',      label: '文字识别 OCR' },
    { key: '图形分割 SAM3',     label: '图形分割 SAM3' },
    { key: '图形处理 Shape',    label: '图形处理 Shape' },
    { key: '生成XML片段',       label: '生成XML片段' },
    { key: '合并XML Merge',     label: '合并XML Merge' },
  ];

  let _stageStatus = [];   // 'pending' | 'active' | 'done'
  let _stageStart  = [];   // timestamp or null
  let _stageEnd    = [];   // timestamp or null
  let _currentIdx  = -1;

  function initStages() {
    _stageStatus = STAGES.map(() => 'pending');
    _stageStart  = STAGES.map(() => null);
    _stageEnd    = STAGES.map(() => null);
    _currentIdx  = -1;
    renderStages();
  }

  function activateStage(idx) {
    if (idx < 0 || idx >= STAGES.length || idx === _currentIdx) return;
    const now = Date.now();
    // Mark all stages before idx as done (including when jumping from -1)
    for (let i = 0; i < idx; i++) {
      if (_stageStatus[i] !== 'done') {
        _stageStatus[i] = 'done';
        if (!_stageStart[i]) _stageStart[i] = now;
        if (!_stageEnd[i])   _stageEnd[i]   = now;
      }
    }
    // Mark current as done if switching away
    if (_currentIdx >= 0 && _stageStatus[_currentIdx] === 'active') {
      _stageStatus[_currentIdx] = 'done';
      _stageEnd[_currentIdx] = now;
    }
    _currentIdx = idx;
    _stageStatus[idx] = 'active';
    _stageStart[idx] = now;
    renderStages();
  }

  function completeAllStages() {
    const now = Date.now();
    for (let i = 0; i < STAGES.length; i++) {
      if (_stageStatus[i] !== 'done') {
        _stageStatus[i] = 'done';
        if (!_stageStart[i]) _stageStart[i] = now;
        if (!_stageEnd[i])   _stageEnd[i]   = now;
      }
    }
    _currentIdx = -1;
    renderStages();
  }

  function renderStages() {
    const segs = document.getElementById('progressSegments');
    const list = document.getElementById('stagesList');
    if (!segs || !list) return;

    const doneCount = _stageStatus.filter(s => s === 'done').length;
    progressLabel.innerHTML = `处理进度 <span class="stage-count">${doneCount} / ${STAGES.length}</span>`;

    // Segmented bar
    segs.innerHTML = '';
    STAGES.forEach((_, i) => {
      const seg = document.createElement('div');
      seg.className = 'progress-segment ' + _stageStatus[i];
      segs.appendChild(seg);
    });

    // Stage rows
    list.innerHTML = '';
    STAGES.forEach((stage, i) => {
      const st = _stageStatus[i];
      const row = document.createElement('div');
      row.className = 'stage-row';

      const icon = document.createElement('div');
      icon.className = 'stage-icon ' + st;
      icon.textContent = st === 'done' ? '✓' : st === 'active' ? '●' : '○';

      const label = document.createElement('div');
      label.className = 'stage-label ' + st;
      label.textContent = stage.label;

      const time = document.createElement('div');
      time.className = 'stage-time ' + st;
      time.id = 'stage-time-' + i;
      if (st === 'done' && _stageStart[i] && _stageEnd[i]) {
        time.textContent = ((_stageEnd[i] - _stageStart[i]) / 1000).toFixed(1) + 's';
      } else if (st === 'active' && _stageStart[i]) {
        time.textContent = ((Date.now() - _stageStart[i]) / 1000).toFixed(1) + 's';
      }

      row.appendChild(icon);
      row.appendChild(label);
      row.appendChild(time);
      list.appendChild(row);
    });
  }

  function updateActiveTimer() {
    if (_currentIdx < 0 || !_stageStart[_currentIdx]) return;
    const el = document.getElementById('stage-time-' + _currentIdx);
    if (el) el.textContent = ((Date.now() - _stageStart[_currentIdx]) / 1000).toFixed(1) + 's';
  }

  // ── Polling ─────────────────────────────────────────────────────────────────
  function startPolling() {
    _startTime = Date.now();
    initStages();

    _timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - _startTime) / 1000);
      const m = Math.floor(elapsed / 60), s = elapsed % 60;
      progressTimer.textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
      updateActiveTimer();
    }, 1000);

    _statusPoller = setInterval(async () => {
      try {
        const res = await fetch('/status');
        if (!res.ok) return;
        const data = await res.json();
        const idx = STAGES.findIndex(s => s.key === data.step);
        if (idx >= 0) activateStage(idx);
        if (data.step === '完成') completeAllStages();
        if (data.message) progressDetail.textContent = data.message;
      } catch {}
    }, 1500);
  }

  function stopPolling() {
    if (_statusPoller)  { clearInterval(_statusPoller);  _statusPoller = null; }
    if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  }

  // ── File handling ────────────────────────────────────────────────────────────
  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function setFile(file) {
    selectedFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewName.textContent = file.name;
    infoName.textContent = file.name;
    infoSize.textContent = formatBytes(file.size);
    previewRow.classList.add('visible');
    progressWrap.classList.remove('visible');
    resultCard.classList.remove('visible');
    resultBlob = null;
  }

  function clearAll() {
    selectedFile = null; resultBlob = null; fileInput.value = '';
    previewRow.classList.remove('visible');
    progressWrap.classList.remove('visible');
    resultCard.classList.remove('visible');
  }

  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
  clearBtn.addEventListener('click', clearAll);

  convertBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    convertBtn.disabled = true;
    progressWrap.classList.add('visible');
    progressDetail.textContent = '';
    progressTimer.textContent = '0s';
    resultCard.classList.remove('visible');
    startPolling();

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/convert', { method: 'POST', body: formData });
      stopPolling();
      completeAllStages();

      if (!res.ok) {
        let errMsg = `HTTP ${res.status}`;
        try { const j = await res.json(); errMsg = j.detail || JSON.stringify(j); } catch {}
        showError(errMsg); return;
      }

      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('xml') || contentType.includes('octet-stream')) {
        resultBlob = await res.blob();
        const disp = res.headers.get('content-disposition') || '';
        const m = disp.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
        resultFilename = m ? m[1].replace(/['"]/g, '') : selectedFile.name.replace(/\.[^.]+$/, '') + '.xml';
        showSuccess(await resultBlob.text());
      } else {
        const json = await res.json();
        resultBlob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
        resultFilename = selectedFile.name.replace(/\.[^.]+$/, '') + '_result.json';
        showSuccess(JSON.stringify(json, null, 2));
      }
    } catch (err) {
      stopPolling();
      showError(err.message || 'Network error');
    } finally {
      convertBtn.disabled = false;
    }
  });

  function openInDrawio(xmlText) {
    try {
      const compressed = pako.deflateRaw(encodeURIComponent(xmlText));
      let bin = '';
      for (let i = 0; i < compressed.length; i++) bin += String.fromCharCode(compressed[i]);
      window.open('https://app.diagrams.net/#R' + btoa(bin), '_blank');
    } catch (e) { alert('Failed to open in draw.io: ' + e.message); }
  }

  function showSuccess(text) {
    progressWrap.classList.remove('visible');
    resultDot.className = 'dot success';
    resultTitle.textContent = 'Conversion complete';
    resultBody.innerHTML = '';

    const preview = document.createElement('div');
    preview.className = 'xml-preview';
    preview.textContent = text.slice(0, 2000) + (text.length > 2000 ? '\n…(truncated)' : '');
    resultBody.appendChild(preview);

    const actions = document.createElement('div');
    actions.className = 'result-actions';

    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn btn-download';
    dlBtn.innerHTML = '⬇ Download XML';
    dlBtn.addEventListener('click', () => {
      const url = URL.createObjectURL(resultBlob);
      const a = document.createElement('a'); a.href = url; a.download = resultFilename; a.click();
      URL.revokeObjectURL(url);
    });
    actions.appendChild(dlBtn);

    if (text.trim().startsWith('<')) {
      const drawioBtn = document.createElement('button');
      drawioBtn.className = 'btn btn-drawio';
      drawioBtn.innerHTML = '✎ Open in draw.io';
      drawioBtn.addEventListener('click', () => openInDrawio(text));
      actions.appendChild(drawioBtn);
    }

    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn btn-ghost';
    copyBtn.textContent = 'Copy to clipboard';
    copyBtn.addEventListener('click', () => {
      resultBlob.text().then(t => navigator.clipboard.writeText(t).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy to clipboard', 2000);
      }));
    });
    actions.appendChild(copyBtn);

    resultBody.appendChild(actions);
    resultCard.classList.add('visible');
  }

  function showError(msg) {
    progressWrap.classList.remove('visible');
    resultDot.className = 'dot error';
    resultTitle.textContent = 'Conversion failed';
    resultBody.innerHTML = `<div class="error-msg">${escapeHtml(msg)}</div>`;
    resultCard.classList.add('visible');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
